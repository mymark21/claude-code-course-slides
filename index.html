<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code 课程演示</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Serif SC', 'Source Serif 4', serif;
            background: #faf9f7;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 800px;
            text-align: center;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            margin-bottom: 1rem;
            color: #1a1a1a;
        }

        p {
            font-size: clamp(1rem, 2vw, 1.2rem);
            color: #555;
            margin-bottom: 3rem;
            line-height: 1.6;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .option {
            background: #f5f3ee;
            padding: 2rem;
            border: 2px solid #d4cfc7;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            position: relative;
        }

        .option::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            width: 16px;
            height: 16px;
            border-top: 3px solid #c41e3a;
            border-left: 3px solid #c41e3a;
        }

        .option:hover {
            border-color: #c41e3a;
            transform: translateY(-4px);
        }

        .option h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #c41e3a;
        }

        .option .desc {
            font-size: 0.95rem;
            color: #666;
            line-height: 1.6;
        }

        .badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border: 1px solid #8b9d83;
            color: #8b9d83;
            font-size: 0.85rem;
            margin-top: 1rem;
            font-weight: 600;
        }

        .recommended {
            border-color: #c41e3a;
            color: #c41e3a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Claude Code 课程演示</h1>
        <p>选择你喜欢的风格开始学习</p>

        <div class="options">
            <a href="claude-code-course-wabi-sabi.html" class="option">
                <h2>日系侘寂风格</h2>
                <p class="desc">温暖米色背景、优雅衬线字体、精致框线装饰</p>
                <span class="badge recommended">推荐</span>
            </a>

            <a href="claude-code-course.html" class="option">
                <h2>终端绿色风格</h2>
                <p class="desc">GitHub 暗色主题、终端美学、扫描线效果</p>
                <span class="badge">开发者风格</span>
            </a>
        </div>
    </div>
</body>
</html>
